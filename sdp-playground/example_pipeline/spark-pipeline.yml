name: example_pipeline

# SDP requires an absolute URI for storage (e.g. file://, s3a://, hdfs://).
# This path is resolved on the Spark driver + workers, which is the
# `./pipeline-storage` host directory mounted into every container by
# `docker-compose.yaml` at `/opt/spark/pipeline-storage`.
storage: file:///opt/spark/pipeline-storage

libraries:
  - glob:
      include: transformations/**

configuration:
  spark.sql.shuffle.partitions: '16'